name: Publish

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Package version to publish (must exactly match package.json `version`)"
        required: true
        type: string
      dryRun:
        description: "Run npm publish --dry-run instead of a real publish"
        required: false
        default: "false"
        type: string

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          cache: npm
      - name: Ensure npm supports Trusted Publishing
        run: |
          npm install -g npm@latest
          npm --version
      - name: Verify requested version matches package.json
        run: |
          set -euo pipefail
          INPUT_VERSION='${{ github.event.inputs.version }}'
          PKG_VERSION="$(node -p "require('./package.json').version")"
          echo "input  version: ${INPUT_VERSION}"
          echo "package version: ${PKG_VERSION}"
          if [ "${INPUT_VERSION}" != "${PKG_VERSION}" ]; then
            echo "::error::requested version '${INPUT_VERSION}' does not match package.json version '${PKG_VERSION}' — bump package.json first"
            exit 1
          fi
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm test
      - run: npm run build
      - name: npm publish
        if: ${{ github.event.inputs.dryRun != 'true' }}
        run: |
          rm -f "$RUNNER_TEMP/.npmrc"
          npm publish --access public --provenance
      - name: npm publish (dry run)
        if: ${{ github.event.inputs.dryRun == 'true' }}
        run: |
          rm -f "$RUNNER_TEMP/.npmrc"
          npm publish --dry-run --access public
